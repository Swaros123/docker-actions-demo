name: Docker Build & Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract commit SHA
        id: vars
        run: echo "sha_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT


      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/actions-demo:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/actions-demo:latest \
                     ${{ secrets.DOCKERHUB_USERNAME }}/actions-demo:${{ steps.vars.outputs.sha_tag }}

      - name: Push latest tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/actions-demo:latest

      - name: Push SHA tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/actions-demo:${{ steps.vars.outputs.sha_tag }}